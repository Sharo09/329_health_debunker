# Hand-labelled eval cases for stratified synthesis (Patch B Task 7).
#
# Each case fixes a LockedPICO + a list of papers (with pre-extracted
# stratifier values and a stance) and declares the expected output of
# the deterministic stratification pipeline.
#
# The eval runner (tests/test_stratification_eval.py) skips the LLM
# value-extractor entirely — papers[*].extracted_values is treated as
# ground-truth, so the asserts measure only the deterministic stratum-
# assigner + bucket builder + warning detector.
#
# Coverage targets (from docs/elicitation_spec_patchB.md Task 7):
#   - All four stratifier slots stated; mixed papers
#   - Only dose stated; other slots N/A
#   - Form matches the minority (generalisation warning)
#   - Dose higher than all papers
#   - Population narrower than any paper (intersection)
#
# Field schema per case:
#   name:                  <descriptive>
#   locked_pico:           LockedPICO fields (nulls allowed)
#   papers:                list of { paper_id, extracted_values, stance,
#                                    relevance_score? (default 0.8) }
#   expected:
#     stratum_counts:      per-slot: { stratum: count, ... }
#                          asserted exactly. Strata not listed must be
#                          absent from the bucket's counts dict.
#     stratum_verdicts:    (optional) per-slot:
#                          { stratum: "supported"|"contradicted"|
#                             "insufficient_evidence"|"empty" }
#     generalisation_warnings: list of substrings expected to appear in
#                          ANY of the generated warnings (order-free).
#     applicability_counts:(optional) { direct: n, partial: n, generalisation: n }

# ---------------------------------------------------------------------------
# Core shape cases: which slots produce buckets
# ---------------------------------------------------------------------------

- name: all-four-slots-stated-mixed
  locked_pico:
    food: turmeric
    outcome: inflammation
    dose: 500 mg/day
    form: supplement
    frequency: daily
    population: adults with arthritis
  papers:
    - paper_id: P1
      stance: supports
      extracted_values:
        dose_studied: 500 mg/day
        form_studied: supplement
        frequency_studied: daily
        population_studied: adults with knee osteoarthritis
    - paper_id: P2
      stance: supports
      extracted_values:
        dose_studied: 1000 mg/day
        form_studied: supplement
        frequency_studied: daily
        population_studied: adults with rheumatoid arthritis
    - paper_id: P3
      stance: contradicts
      extracted_values:
        dose_studied: null
        form_studied: dietary
        frequency_studied: null
        population_studied: general adult population
  expected:
    stratum_counts:
      dose: { matches: 2, unreported: 1 }
      form: { matches: 2, different: 1 }
      frequency: { matches: 2, unreported: 1 }
      population: { matches: 2, different: 1 }
    generalisation_warnings: []   # 33% mismatch — below 50% threshold

- name: dose-only-stated
  locked_pico:
