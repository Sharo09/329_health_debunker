# ---------------------------------------------------------------------------
# Combined warnings (multiple slots fire)
# ---------------------------------------------------------------------------

- name: form-and-dose-both-mismatched
  # Note: the dose assigner is unit-naive — it compares raw numbers, not
  # canonicalised units. Fixtures must keep user and paper values in the
  # same unit family so the comparison is meaningful.
  locked_pico:
    food: turmeric
    outcome: inflammation
    dose: 100 mg/day
    form: dietary
    frequency: null
    population: null
  papers:
    - { paper_id: S1, stance: supports, extracted_values: { dose_studied: 1000 mg/day, form_studied: supplement } }   # 10× higher
    - { paper_id: S2, stance: supports, extracted_values: { dose_studied: 500 mg/day, form_studied: supplement } }    # 5× higher
    - { paper_id: S3, stance: supports, extracted_values: { dose_studied: 500 mg/day, form_studied: supplement } }    # 5× higher
    - { paper_id: S4, stance: supports, extracted_values: { dose_studied: 2000 mg/day, form_studied: supplement } }   # 20× higher
  expected:
    stratum_counts:
      form: { different: 4 }
      dose: { higher: 4 }
    generalisation_warnings:
      - "dietary"
      - "higher"

- name: form-dose-population-triple-warning
  locked_pico:
    food: vitamin d
    outcome: bone health
    dose: 1000 IU/day
    form: dietary
    frequency: null
    population: children
  papers:
    - { paper_id: P1, stance: supports, extracted_values: { dose_studied: 4000 IU/day, form_studied: supplement, population_studied: older adults } }   # 4× higher
    - { paper_id: P2, stance: supports, extracted_values: { dose_studied: 2500 IU/day, form_studied: supplement, population_studied: adults } }        # 2.5× higher
    - { paper_id: P3, stance: supports, extracted_values: { dose_studied: 5000 IU/day, form_studied: supplement, population_studied: adults } }        # 5× higher
    - { paper_id: P4, stance: supports, extracted_values: { dose_studied: 3000 IU/day, form_studied: supplement, population_studied: older adults } }  # 3× higher
  expected:
    stratum_counts:
      dose: { higher: 4 }
      form: { different: 4 }
      population: { different: 4 }
    generalisation_warnings:
      - "dietary"
      - "higher"
      - "children"

