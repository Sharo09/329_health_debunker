      - "higher"

- name: dose-range-midpoint-matches-and-higher
  locked_pico:
    food: coffee
    outcome: alertness
    dose: 2-3 cups/day              # midpoint 2.5
    form: null
    frequency: null
    population: null
  papers:
    - { paper_id: M1, stance: supports, extracted_values: { dose_studied: 2 cups/day } }     # 0.8x matches
    - { paper_id: M2, stance: supports, extracted_values: { dose_studied: 3 cups/day } }     # 1.2x matches
    - { paper_id: H1, stance: contradicts, extracted_values: { dose_studied: 8 cups/day } }  # 3.2x higher
    - { paper_id: L1, stance: neutral, extracted_values: { dose_studied: 0.5 cups/day } }    # 0.2x lower
  expected:
    stratum_counts:
      dose: { matches: 2, higher: 1, lower: 1 }
    generalisation_warnings:
      - "2-3 cups/day"
      - "higher"                    # 50% off-stratum (1 higher + 1 lower)
                                     # hits the 50% threshold; majority direction ties
                                     # and the detector picks "higher" when equal.

