# ---------------------------------------------------------------------------
# Dose stratum: ratio thresholds, direction warnings
# ---------------------------------------------------------------------------

- name: dose-higher-than-all-papers
  locked_pico:
    food: vitamin d
    outcome: bone health
    dose: 10000 IU/day
    form: null
    frequency: null
    population: null
  papers:
    - { paper_id: P1, stance: supports, extracted_values: { dose_studied: 1000 IU/day } }
    - { paper_id: P2, stance: supports, extracted_values: { dose_studied: 2000 IU/day } }
    - { paper_id: P3, stance: supports, extracted_values: { dose_studied: 800 IU/day } }
    - { paper_id: P4, stance: supports, extracted_values: { dose_studied: 4000 IU/day } }
  expected:
    stratum_counts:
      dose: { lower: 4 }
    generalisation_warnings:
      - "10000 IU/day"
