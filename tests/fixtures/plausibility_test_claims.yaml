# Plausibility eval set for Station 1.5.
#
# Hand-labelled claims. Each row pairs a claim text with the expected
# PlausibilityAgent output: the set of failures that should fire, their
# severities, and whether the pipeline should proceed.
#
# Distribution per docs/plausibility_spec.md Task 8:
#   F1 (dose):         ~15 claims
#   F2 (feasibility):  ~10 claims
#   F3 (mechanism):    ~10 claims
#   F4 (frame):         ~5 claims
#   F5 (clean):        ~20 claims
#   Edge cases:        ~10 claims (multi-failure, ambiguous, borderline)
#
# Fields:
#   claim: raw user-facing claim text
#   food, dose, component, outcome: optional flat-PICO overrides. When
#       omitted, the runner leaves them None and the F1 checker skips.
#       Provide them only for F1 rows where we want to exercise the
#       deterministic check without depending on Station 1 extraction.
#   expected_failures: list of failure_type strings in any order
#   expected_severities: list paired with expected_failures, same order
#   expected_should_proceed: derived (false iff any blocking failure)
#   reasoning_keywords: substrings we expect in the combined reasoning
#       text; case-insensitive. Empty list means "don't check text."
#   notes: short rationale for why this row is in the set

